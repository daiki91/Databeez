version: '3.9'
services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: passer123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - databeez-network

  mysql:
    image: mysql:8.0
    container_name: databeez-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: databeez
      MYSQL_USER: dbuser
      MYSQL_PASSWORD: dbpass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - databeez-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: databeez-phpmyadmin
    depends_on:
      - mysql
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: dbuser
      PMA_PASSWORD: dbpass
    networks:
      - databeez-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: databeez-backend
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: dbuser
      DATABASE_PASSWORD: dbpass
      DATABASE_NAME: databeez
      MINIO_ENDPOINT_HOST: minio
      MINIO_ENDPOINT_PORT: 9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: passer123
      MINIO_BUCKET: databeez-notes
      JWT_SECRET: secret123
    networks:
      - databeez-network

  frontend:
    build:
      context: ./gestion
      dockerfile: Dockerfile.frontend
    container_name: databeez-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:3000/api
    networks:
      - databeez-network

volumes:
  minio_data:
  mysql_data:

networks:
  databeez-network:
    driver: bridge

